<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #ffffff;
            color: #000000;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .hero {
            padding: 60px 20px 30px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0;
        }

        .gallery {
            column-count: 4;
            column-gap: 8px;
            padding: 0 8px 40px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 8px;
            overflow: hidden;
            border-radius: 0;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.35s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.04);
        }

        /* TABLET */
        @media (max-width: 992px) {

            .gallery {
                column-count: 4;
                column-gap: 6px;
                padding: 0 6px 25px;
            }

            .gallery-item {
                margin-bottom: 6px;
            }

            .hero h1 {
                font-size: 2rem;
            }
        }

        /* MOBILE */
        @media (max-width: 576px) {

            .gallery {
                column-count: 4;
                column-gap: 4px;
                padding: 0 4px 20px;
            }

            .gallery-item {
                margin-bottom: 4px;
            }

            .hero {
                padding: 25px 10px 15px;
            }

            .hero h1 {
                font-size: 1.1rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top custom-navbar">
        <div class="container custom-nav-container">

            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo/logoLF.png" alt="Lafoudre Logo">
            </a>

            <!-- Hamburger Button -->
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#mobileMenu" aria-controls="mobileMenu">

                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Desktop Menu -->
            <div class="collapse navbar-collapse d-none d-lg-flex">
                <ul class="navbar-nav mx-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="lookbook.html">Look Book</a></li>
                    <li class="nav-item"><a class="nav-link" href="community.html">Community</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MOBILE SIDEBAR -->
    <div class="offcanvas offcanvas-end custom-sidebar" tabindex="-1" id="mobileMenu">

        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-white">MENU</h5>

            <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="offcanvas">
            </button>
        </div>

        <div class="offcanvas-body">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="shop.html">Shop</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="lookbook.html">Look Book</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="community.html">Community</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>
            </ul>
        </div>
    </div>

    <section class="gallery">
        <div class="gallery-item"><img src="image/kom1.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom2.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom3.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom4.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom5.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom6.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom7.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom8.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom9.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom10.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom11.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom12.jpg" alt="community"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 La Foudre</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
