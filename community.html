<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LaFoudre Community</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .hero {
            padding: 60px 20px 30px;
            text-align: center;
        }

        .hero h1 {
            font-size: 2.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0;
        }

        .gallery {
            column-count: 4;
            column-gap: 8px;
            padding: 0 8px 40px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 8px;
            overflow: hidden;
            border-radius: 0;
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.35s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.04);
        }

        @media (max-width: 992px) {
            .gallery {
                column-count: 3;
            }
        }

        @media (max-width: 768px) {
            .gallery {
                column-count: 2;
            }

            .hero h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .gallery {
                column-count: 1;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top custom-navbar">
        <div class="container custom-nav-container">

            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="sticker.png" alt="Lafoudre Logo">
            </a>

            <!-- Mobile buttons -->
            <div class="d-flex d-lg-none align-items-center">
                <button class="navbar-toggler me-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

            </div>

            <!-- Nav -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <!-- menu tengah -->
                <ul class="navbar-nav mx-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="collections.html">Collections</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="lookbook.html">Look Book</a></li>
                    <li class="nav-item"><a class="nav-link" href="community.html">Community</a></li>
                </ul>

            </div>
        </div>
    </nav>

    <section class="hero">
        <h1>LaFoudre Community</h1>
    </section>

    <section class="gallery">
        <div class="gallery-item"><img src="image/kom1.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom2.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom3.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom4.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom5.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom6.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom7.jpeg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom8.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom9.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom10.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom11.jpg" alt="community"></div>
        <div class="gallery-item"><img src="image/kom12.jpg" alt="community"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>

</body>

</html>
