<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Foudre</title>
    <link rel="icon" type="image/png" href="logo/logoLF.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top custom-navbar">
        <div class="container custom-nav-container">

            <!-- Logo -->
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo/logoLF.png" alt="Lafoudre Logo">
            </a>

            <!-- Hamburger Button -->
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#mobileMenu" aria-controls="mobileMenu">

                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Desktop Menu -->
            <div class="collapse navbar-collapse d-none d-lg-flex">
                <ul class="navbar-nav mx-auto align-items-lg-center">
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="lookbook.html">Look Book</a></li>
                    <li class="nav-item"><a class="nav-link" href="community.html">Community</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MOBILE SIDEBAR -->
    <div class="offcanvas offcanvas-end custom-sidebar" tabindex="-1" id="mobileMenu">

        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-white">MENU</h5>

            <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="offcanvas">
            </button>
        </div>

        <div class="offcanvas-body">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="shop.html">Shop</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="lookbook.html">Look Book</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="community.html">Community</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Carousel Section -->
    <div id="home">
        <div id="lafoudreCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="image/look21.jpg" class="d-block w-100" alt="Fashion 1">
                </div>
                <div class="carousel-item">
                    <img src="image/look17.jpg" class="d-block w-100" alt="Fashion 2">
                </div>
                <div class="carousel-item">
                    <img src="image/look26.jpg" class="d-block w-100" alt="Fashion 3">
                </div>
            </div>
        </div>
    </div>


    <!-- Profile Logo Overlay -->
    <!--<img src="logo.png" alt="Profile Logo" class="profile-logo">

    <!-- ================= DROPDOWN ================= -->
    <div class="info-dropdown container">

        <!-- Shopping Method -->
        <div class="custom-accordion-item">
            <button class="custom-accordion-btn" type="button" data-bs-toggle="collapse"
                data-bs-target="#shoppingMethod">

                <span>Shopping Method</span>
                <i class="bi bi-chevron-down"></i>
            </button>

            <div id="shoppingMethod" class="collapse">
                <div class="custom-accordion-content">

                    <div class="method-item">
                        <img src="logo/Shopee.png" alt="Logo Shopee" width="50">
                        <span></span>
                    </div>

                </div>
            </div>
        </div>

        <!-- Shipment Method -->
        <div class="custom-accordion-item">
            <button class="custom-accordion-btn" type="button" data-bs-toggle="collapse"
                data-bs-target="#shipmentMethod">

                <span>Shipment Method</span>
                <i class="bi bi-chevron-down"></i>
            </button>

            <div id="shipmentMethod" class="collapse">
                <div class="custom-accordion-content">

                    <div class="method-item">
                        <img src="logo/jne.svg" alt="JNE">
                        <span></span>
                    </div>

                    <div class="method-item">
                        <img src="logo/j&t.svg" alt="J&T">
                        <span></span>
                    </div>

                </div>
            </div>
        </div>

    </div>
    <!-- ================= INFO DROPDOWN ================= -->

    <!-- Social Media -->
    <div class="social-links text-center">

        <div class="social-buttons">

            <a href="https://shopee.co.id/lafoudre?entryPoint=ShopBySearch&searchKeyword=lafoudre" target="_blank"
                class="social-btn">
                <i class="bi bi-bag-fill"></i>
            </a>

            <a href="https://www.instagram.com/21foudre?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw=="
                target="_blank" class="social-btn">
                <i class="bi bi-instagram"></i>
            </a>

            <a href="https://www.tiktok.com/@21foudre?is_from_webapp=1&sender_device=pc" target="_blank"
                class="social-btn">
                <i class="bi bi-tiktok"></i>
            </a>

        </div>
    </div>


    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 La Foudre</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS (wajib untuk navbar collapse, dropdown, dll) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script -->
    <script src="script.js"></script>

</body>

</html>
